name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 bandit
    
    - name: Lint with flake8
      run: |
        flake8 app.py --max-line-length=120 --ignore=E501,W503 || true
    
    - name: Security scan with bandit
      run: |
        bandit -r . -f txt -o bandit_report.txt || true
        cat bandit_report.txt
    
    - name: Verify app imports
      run: |
        python -c "import app; print('✅ App loads successfully')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1
    
    - name: Deploy notification
      run: |
        echo "✅ CI/CD Pipeline Complete"
        echo "Tests passed. Ready for deployment to EC2."
        echo "Deployment timestamp: $(date)"