name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 bandit
    
    - name: Lint with flake8
      run: flake8 app.py --max-line-length=120 --ignore=E501,W503 || true
    
    - name: Security scan with bandit
      run: bandit -r . -f txt -o bandit_report.txt || true
    
    - name: Verify app imports
      run: python -c "import app; print('✅ App loads successfully')"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        echo "${{ secrets.BASTION_IP }}" > ~/.ssh/bastion_ip
    
    - name: Deploy to EC2 via Bastion
      run: |
        # Connect to Bastion, then to private EC2, and deploy
        ssh -o StrictHostKeyChecking=no -J ubuntu@${{ secrets.BASTION_IP }} ubuntu@10.0.3.194 '
          cd /home/ubuntu/app
          echo "Pulling latest code..."
          git pull https://github.com/AmbadySanthosh/trello-clone-capstone.git main
          echo "Activating virtual environment..."
          source venv/bin/activate
          echo "Installing dependencies..."
          pip install -r requirements.txt
          echo "Restarting services..."
          sudo systemctl restart trello
          sudo systemctl restart nginx
          echo "✅ Deployment completed at $(date)"
        '